<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>照了么 · Mirror Talk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000;font-family:-apple-system,system-ui,sans-serif}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative;max-width:500px;margin:0 auto}
#view{flex:1;position:relative;overflow:hidden;background:#111}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:none}
#video.on{display:block}
#start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:5}
#start.hidden{display:none}
#start .btn{width:80px;height:80px;border-radius:50%;border:3px solid rgba(76,175,80,.5);background:rgba(76,175,80,.1);color:#4cff8d;font-size:32px;cursor:pointer}
#start .btn:active{transform:scale(.93)}
#start .txt{color:rgba(255,255,255,.4);font-size:14px;text-align:center;padding:0 16px}
#status{position:absolute;top:12px;left:50%;transform:translateX(-50%);padding:5px 12px;border-radius:10px;font-size:11px;font-weight:600;z-index:10;pointer-events:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);transition:.2s}
#status.listening{background:rgba(0,200,83,.2);color:#4cff8d}
#status.thinking{background:rgba(255,152,0,.2);color:#ffb74d}
#status.reply{background:rgba(33,150,243,.2);color:#64b5f6}
#status.err{background:rgba(244,67,54,.2);color:#ef5350}
#profile{position:absolute;top:12px;right:12px;padding:3px 8px;border-radius:6px;font-size:10px;z-index:10;pointer-events:none;display:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
#sub-me{position:absolute;bottom:34%;left:16px;right:16px;text-align:center;z-index:10;pointer-events:none;display:none}
#sub-me span{display:inline-block;padding:7px 14px;background:rgba(0,0,0,.7);border-radius:10px;color:#4cff8d;font-size:13px;border:1px solid rgba(76,175,80,.2)}
#sub-ai{position:absolute;bottom:22%;left:16px;right:16px;text-align:center;z-index:10;pointer-events:none;display:none}
#sub-ai span{display:inline-block;max-width:90%;padding:10px 16px;background:rgba(10,10,30,.85);border-radius:12px;color:#fff;font-size:13px;line-height:1.5;border:1px solid rgba(100,180,255,.12);animation:up .3s}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#controls{position:absolute;bottom:30px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:12px;z-index:20}
#talk{width:68px;height:68px;border-radius:50%;border:2.5px solid rgba(76,175,80,.35);background:rgba(76,175,80,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;transition:.15s;-webkit-tap-highlight-color:transparent;user-select:none}
#talk:active,#talk.active{background:rgba(76,175,80,.35);border-color:#4cff8d;box-shadow:0 0 32px rgba(76,175,80,.25);transform:scale(.93)}
#voice-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);cursor:pointer;font-size:15px;transition:.15s;line-height:36px;text-align:center}
#voice-btn:active{background:rgba(255,255,255,.12)}
</style>
</head>
<body>
<div id="app">
<div id="view">
<video id="video" autoplay playsinline muted></video>
<div id="start">
<button id="start-btn" class="btn">📷</button>
<div id="start-txt" class="txt">点击启动 · 按住说话</div>
</div>
<div id="status">ready</div>
<div id="profile"></div>
<div id="sub-me"><span></span></div>
<div id="sub-ai"><span></span></div>
</div>
<div id="controls">
<button id="voice-btn" title="切换AI声音">👩</button>
<button id="talk">🎤</button>
</div>
</div>

<script>
const Q=id=>document.getElementById(id),API='/api';
let hist=[],rec=false,camStream=null,micStream=null,mr=null,chunks=[],spk=false,profile={};
let voiceGender=localStorage.getItem('mt-voice')||'female';
let savedVoices=[];

function S(t,c){Q('status').textContent=t;Q('status').className=c||'';}

function updateVoiceBtn(){
Q('voice-btn').textContent=voiceGender==='female'?'👩':'👨';
Q('voice-btn').style.borderColor=voiceGender==='female'?'rgba(255,105,180,.3)':'rgba(100,180,255,.3)';
}
updateVoiceBtn();

Q('voice-btn').addEventListener('click',()=>{
voiceGender=voiceGender==='female'?'male':'female';
localStorage.setItem('mt-voice',voiceGender);
updateVoiceBtn();
if(spk){speechSynthesis.cancel();spk=false;}
});

async function startCam(){
Q('start-txt').textContent='starting...';
try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});Q('video').srcObject=camStream;Q('video').classList.add('on');}
catch(e){console.log('no camera');}
try{micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});}
catch(e){Q('start-txt').textContent='需要麦克风权限';Q('start-txt').style.color='#ef5350';return;}
savedVoices=speechSynthesis.getVoices();
Q('start').classList.add('hidden');S('按住 🎤 说话');
}
Q('start-btn').addEventListener('click',startCam);
Q('start-btn').addEventListener('touchend',e=>{e.preventDefault();startCam();});

function go(){
if(spk){speechSynthesis.cancel();spk=false;}
if(!micStream){Q('start-txt').textContent='先点📷!';return;}
rec=true;chunks=[];Q('talk').classList.add('active');
Q('sub-me').style.display='none';Q('sub-ai').style.display='none';
S('🎤 录音中...','listening');
try{mr=new MediaRecorder(micStream,{mimeType:MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm'});}
catch(e){mr=new MediaRecorder(micStream);}
mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
mr.onstop=process;
mr.start(100);
}

async function end(){if(!rec)return;rec=false;Q('talk').classList.remove('active');if(mr&&mr.state!=='inactive')mr.stop();}

async function process(){
await new Promise(r=>setTimeout(r,300));
if(!chunks.length){S('太短，再试');return;}
const blob=new Blob(chunks,{type:'audio/webm'});
if(blob.size<600){S('太短，再说一次');return;}

S('Groq 听写 + DeepSeek 思考...','thinking');
try{
const fd=new FormData();fd.append('audio',blob,'speech.webm');fd.append('history',JSON.stringify(hist));
const c=new AbortController();const t=setTimeout(()=>c.abort(),20000);
const r=await fetch(API+'/talk',{method:'POST',signal:c.signal,body:fd});
clearTimeout(t);
if(!r.ok){const e=await r.text();throw new Error(r.status+': '+e.substring(0,60));}
const d=await r.json();
if(d.error==='no_speech'){S('没听清');return;}

Q('sub-me').querySelector('span').textContent='👤 '+d.userText;Q('sub-me').style.display='block';
profile={lang:d.lang,gender:d.gender};
Q('profile').textContent=(d.lang||'')+'·'+(d.gender||'');Q('profile').style.display='block';
hist.push({role:'user',content:d.userText},{role:'assistant',content:d.reply});
if(hist.length>20)hist=hist.slice(-20);
Q('sub-ai').querySelector('span').textContent=d.reply;Q('sub-ai').style.display='block';
speak(d.reply);
}catch(e){S('error: '+e.message,'err');setTimeout(()=>S('按住 🎤 说话'),3000);}
}

function loadVoices(){
const vs=speechSynthesis.getVoices();
if(vs.length)savedVoices=vs;
}
function speak(text){
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang='zh-CN';u.rate=1.02;u.volume=1;
u.onstart=()=>{spk=true;S('镜中人回复...','reply');};
u.onend=()=>{spk=false;S('按住 🎤 说话');};
u.onerror=e=>{spk=false;console.log('TTS error',e.error);S('按住 🎤 说话');};
setTimeout(()=>speechSynthesis.speak(u),50);
}

loadVoices();
speechSynthesis.onvoiceschanged=loadVoices;
const tb=Q('talk');
tb.addEventListener('pointerdown',go);tb.addEventListener('pointerup',end);tb.addEventListener('pointerleave',end);
tb.addEventListener('touchstart',e=>{e.preventDefault();go();},{passive:false});
tb.addEventListener('touchend',e=>{e.preventDefault();end();},{passive:false});
</script>
</body>
</html>
